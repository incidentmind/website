plan_id: eleventy-yaml-content-drive-index
objective: Convert /Users/admin/dev/website/index.html into an Eleventy-driven page where all section text/content is extracted into a YAML file and the page renders from that YAML data, using Eleventy docs guidance.
created_at: 2026-03-19T00:00:00Z
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
  Convert the current static landing page into a minimal Eleventy project without changing the page’s role or layout structure.
  Keep `index.html` as the page template, add only the Eleventy files required to build, and move all user-facing section copy/content into a single YAML data file that the template renders with Eleventy’s default HTML/Liquid processing.
open_questions:
  - None blocking; the current plan assumes a template-local YAML data file (`index.11tydata.yaml`) is acceptable as the requested YAML source.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: YAML data is added without registering a YAML data extension, so Eleventy ignores or fails to parse the file.
      likelihood: medium
      impact: high
      mitigation: Add `yaml` as a dependency and register `yml,yaml` via `eleventyConfig.addDataExtension(...)` in `eleventy.config.js` before template conversion.
    - scenario: Template conversion leaves stray hard-coded content in `index.html`, resulting in a partial extraction that violates the objective.
      likelihood: medium
      impact: high
      mitigation: Use a section-by-section extraction checklist covering nav, hero, problem, services, approach, proof, positioning, tech, open source, CTA, and footer before verification.
    - scenario: Eleventy build fails because the template syntax chosen for loops/conditionals conflicts with the HTML processing configuration.
      likelihood: low
      impact: high
      mitigation: Keep Eleventy’s default HTML-as-Liquid behavior unless a concrete limitation is hit; verify with a clean build immediately after templating.
  assumptions:
    - Node.js 18+ is available or can be installed by the implementer during setup.
    - Keeping the CSS, JavaScript, classes, and section structure largely unchanged satisfies the minimal-change constraint.
    - A template-specific YAML data file next to `index.html` is an acceptable interpretation of the requested YAML content file.

implementation_specification:
  code_structure: Keep the existing flat site structure. Add a minimal Eleventy config at the repo root, keep `index.html` as the only page template, and colocate a single YAML data file with the template to avoid introducing unnecessary folders or layouts.
  affected_areas:
    - package management and Eleventy scripts at the repository root
    - Eleventy configuration for YAML data parsing
    - landing page template/data split for `index.html`
  component_details:
    - component: Eleventy project bootstrap
      responsibility: Provide the smallest working Eleventy project setup, including scripts and dependencies.
      interfaces:
        - `package.json` scripts for build/dev workflows
        - `eleventy.config.js` registering YAML data parsing
    - component: Landing page content model
      responsibility: Hold all user-facing section copy, labels, URLs, metrics, list items, cards, and repeated collections in one YAML source.
      interfaces:
        - `index.11tydata.yaml` data contract consumed by `index.html`
    - component: Landing page template binding
      responsibility: Render the existing page from YAML-backed data while preserving current DOM structure, classes, and anchors.
      interfaces:
        - Liquid expressions and loops inside `index.html`
  dependencies:
    - component: `index.html`
      relationship: Consumes the schema produced in `index.11tydata.yaml`
    - component: `eleventy.config.js`
      relationship: Enables Eleventy to parse YAML data files used by `index.html`
    - component: `package.json`
      relationship: Installs and runs Eleventy/YAML tooling required by config and build verification
  integration_points:
    - Eleventy CLI build output to default `_site/` directory
    - HTML template rendering via Eleventy’s default HTML/Liquid preprocessing
    - Template-specific data loading via `index.11tydata.yaml`

contracts:
  - from_task: T1
    to_task: T3
    interface: Eleventy runtime and config capable of parsing `.yaml` data files and building `index.html` to `_site/index.html`.
    format: `package.json` scripts plus `eleventy.config.js` with `addDataExtension("yml,yaml", parser)`
  - from_task: T2
    to_task: T3
    interface: Structured YAML content covering every user-facing section and repeated content block currently hard-coded in the landing page.
    format: `index.11tydata.yaml` object/array schema keyed by section (`nav`, `hero`, `problem`, `services`, `approach`, `proof`, `positioning`, `tech`, `openSource`, `contact`, `footer`)
  - from_task: T3
    to_task: T4
    interface: Buildable Eleventy template with content rendered from YAML instead of hard-coded section copy.
    format: `index.html` using Liquid variables/loops with no required content values duplicated in markup

tasks:
  - id: T1
    title: Add minimal Eleventy bootstrap and YAML parsing support
    description: |
      Create the smallest viable Eleventy project setup for this repo.
      Add `package.json` with local Eleventy and YAML parser dependencies, build/dev scripts, and a root `eleventy.config.js` that registers YAML data support via Eleventy’s documented custom data extension API.
      Do not add layouts, includes, or directory changes unless they are required.
    wave: 1
    agent: gem-implementer
    priority: medium
    status: pending
    dependencies: []
    context_files:
      - /Users/admin/dev/website/index.html: Existing landing page that will become the Eleventy template.
      - /Users/admin/dev/website/README.md: Minimal repo context; no existing build system.
    estimated_effort: small
    estimated_files: 2
    estimated_lines: 80
    focus_area: project setup
    verification:
      - Confirm dependencies and scripts are present and consistent with Eleventy v3 docs.
      - Confirm config registers `yml,yaml` parsing without changing output to the input directory.
    acceptance_criteria:
      - `package.json` exists with `@11ty/eleventy` and `yaml` dependencies.
      - `eleventy.config.js` exists and registers YAML data parsing.
      - The plan keeps Eleventy output in `_site/` to avoid duplicate HTML build pitfalls.
    failure_modes:
      - scenario: Build scripts or config assume ESM/CommonJS inconsistently.
        likelihood: medium
        impact: medium
        mitigation: Choose one config style and align package metadata/scripts to it.
    tech_stack:
      - Node.js 18+
      - @11ty/eleventy v3.x
      - yaml npm package
    test_coverage: null

  - id: T2
    title: Extract all landing-page content into a single YAML data file
    description: |
      Move all user-facing section content out of `index.html` into a single YAML file colocated with the template.
      Capture nav labels, hero copy, metrics, problem cards, service tiers, service feature lists, platform cards, workflow steps, proof entries, positioning bullets, tech categories, OSS cards, CTA details, footer text, and any relevant URLs/labels needed to render the page.
      Keep styling and behavior concerns out of the data file unless they are already content-coupled (for example badge labels or icon identifiers required by repeated content blocks).
    wave: 1
    agent: gem-implementer
    priority: high
    status: pending
    dependencies: []
    context_files:
      - /Users/admin/dev/website/index.html: Source of all current page copy and repeated content collections.
    estimated_effort: medium
    estimated_files: 1
    estimated_lines: 250
    focus_area: content extraction
    verification:
      - Compare every major section in `index.html` against the YAML schema.
      - Ensure repeated UI blocks are represented as arrays instead of duplicated scalar keys.
    acceptance_criteria:
      - A single YAML file exists for the page content.
      - All section text/content needed to render the page is present in YAML.
      - The YAML structure is clear enough to drive loops in the template.
    failure_modes:
      - scenario: Some copy remains embedded in HTML because it is nested inside repeated cards or badges.
        likelihood: medium
        impact: high
        mitigation: Use a section-by-section extraction checklist and treat every repeated block as data first.
      - scenario: YAML schema is too flat, making the template harder to read and maintain.
        likelihood: low
        impact: medium
        mitigation: Group content by page section with arrays for repeated items.
    tech_stack:
      - YAML
      - Eleventy template data conventions
    test_coverage: null

  - id: T3
    title: Convert `index.html` into a YAML-driven Eleventy template
    description: |
      Preserve `index.html` as the page template and replace hard-coded section content with Liquid variable lookups and loops backed by the YAML file.
      Keep the existing CSS, JavaScript, anchors, classes, accessibility attributes, and visual structure as intact as possible.
      Add only the minimal front matter or template syntax needed for Eleventy to render the page correctly.
    wave: 2
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
      - T1
      - T2
    context_files:
      - /Users/admin/dev/website/index.html: Target template for Eleventy rendering.
      - /Users/admin/dev/website/index.11tydata.yaml: YAML source of extracted content.
      - /Users/admin/dev/website/eleventy.config.js: YAML parsing support for Eleventy.
    estimated_effort: medium
    estimated_files: 2
    estimated_lines: 350
    focus_area: template binding
    verification:
      - Confirm major sections render from arrays/objects rather than hard-coded strings.
      - Confirm anchor ids and section order remain unchanged.
      - Confirm no required user-facing section copy is duplicated between HTML and YAML.
    acceptance_criteria:
      - `index.html` remains the page template.
      - The rendered page content comes from the YAML file.
      - Structural/styling code remains minimally changed.
    failure_modes:
      - scenario: Liquid syntax in HTML becomes hard to read or breaks due to malformed loops/conditionals.
        likelihood: medium
        impact: high
        mitigation: Keep loops shallow, align schema to the existing DOM, and validate after each section conversion.
      - scenario: Converting URLs, icon names, or labels into data accidentally changes CTA/navigation behavior.
        likelihood: low
        impact: medium
        mitigation: Preserve href targets and icon class names exactly unless intentionally changed.
    tech_stack:
      - HTML
      - Liquid (Eleventy default for `.html`)
      - YAML data
    test_coverage: null

  - id: T4
    title: Verify build output and changed-file errors
    description: |
      Install dependencies, run the Eleventy build, and perform error checks on the modified files.
      Verify `_site/index.html` is generated successfully and that YAML parsing plus Liquid rendering succeed without diagnostics.
      If verification fails, capture the failure cause and route fixes back to the responsible implementation task before sign-off.
    wave: 3
    agent: gem-reviewer
    priority: high
    status: pending
    dependencies:
      - T3
    context_files:
      - /Users/admin/dev/website/package.json: Build scripts and dependencies.
      - /Users/admin/dev/website/eleventy.config.js: Config under test.
      - /Users/admin/dev/website/index.html: Rendered template source.
    estimated_effort: small
    estimated_files: 3
    estimated_lines: 30
    focus_area: verification
    verification:
      - Run dependency install.
      - Run Eleventy build.
      - Check editor diagnostics on changed files.
      - Confirm `_site/index.html` exists after build.
    acceptance_criteria:
      - Build completes successfully.
      - No relevant errors remain in changed files.
      - Output page is produced at `_site/index.html`.
    failure_modes:
      - scenario: Build passes but template still contains hard-coded content that escaped extraction.
        likelihood: medium
        impact: medium
        mitigation: Spot-check rendered sections against the YAML file and original extraction checklist.
      - scenario: YAML parser dependency is installed but not wired to Eleventy config.
        likelihood: low
        impact: high
        mitigation: Validate both dependency presence and config registration during review.
    requires_review: true
    review_depth: standard
    security_sensitive: false
