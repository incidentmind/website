plan_id: svg-icon-favicon
objective: Add an automation-themed SVG icon as both a favicon and a visible navbar element on the IncidentMind Eleventy site.
created_at: "2026-03-19"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
  Three-wave plan. Wave 1 creates the SVG asset and wires up Eleventy passthrough copy for src/img/.
  Wave 2 updates src/index.html to inject favicon link tags and swap the nav-logo-icon from a
  plain text "IN" div to an inline <img> referencing the SVG. Wave 3 runs the Eleventy build
  and verifies _site/img/icon.svg, _site/index.html favicon tags, and the navbar img are all present.

open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: SVG renders fine at 64 px but is illegible at 16 px favicon size due to fine detail strokes
      likelihood: medium
      impact: medium
      mitigation: |
        Keep stroke-width ≥ 2 px on a 64 viewBox, use rounded linecaps, and limit the design to
        3–4 nodes max. Test by viewing _site/img/icon.svg in a browser tab scaled to 16×16.
    - scenario: Eleventy passthrough for src/img/ not added, so _site/img/icon.svg is never emitted
      likelihood: low
      impact: high
      mitigation: |
        eleventy.config.js edit is in Wave 1 and is a dependency of Wave 3 verification; the
        build will immediately expose a 404 if the passthrough is missing.
    - scenario: Inline <img src="/img/icon.svg"> in navbar clashes with existing nav-logo-icon CSS
      likelihood: low
      impact: low
      mitigation: |
        The img gets width/height="40" attributes matching the existing 40×40 .nav-logo-icon box,
        and the CSS rule already handles sizing; no new CSS rule is strictly required.
  assumptions:
    - src/img/ directory does not yet exist; it will be created when the SVG file is placed there.
    - The Eleventy dev server / build is not running during the edits (or will be restarted after).
    - No separate favicon.ico is required; modern browsers accept SVG favicons via <link rel="icon">.
    - The nav.logo.initials data field in src/index.11tydata.yaml currently renders the "IN" text;
      the HTML template will be updated to show the SVG img instead of that div's text content.

implementation_specification:
  code_structure: |
    New file   src/img/icon.svg         — standalone SVG, viewBox="0 0 64 64", gradient defs inline
    Modified   eleventy.config.js       — add addPassthroughCopy("src/img") line
    Modified   src/index.html           — favicon <link> tags in <head>; <img> in .nav-logo-icon div
  affected_areas:
    - src/img/ (new directory + asset)
    - eleventy.config.js (build config)
    - src/index.html (HTML template)
  component_details:
    - component: icon.svg
      responsibility: |
        Renders an automation / AI-orchestration motif — three interconnected circular nodes
        arranged in a triangle, linked by straight connector lines, with small arc sparks at each
        node suggesting electricity / AI activity. Central node is larger (r=10). Uses an inline
        linearGradient from #6366f1 (indigo) to #8b5cf6 (violet) for all filled shapes. Background
        is a rounded rect in near-black (#06060f) so it matches the site background and looks
        correct on both light and dark browser chrome.
      interfaces:
        - "Consumed by <link rel='icon'> in <head> (favicon)"
        - "Consumed by <img> inside .nav-logo-icon in navbar (display icon)"
    - component: eleventy.config.js passthrough
      responsibility: Copy src/img/ tree verbatim into _site/img/ during every build.
      interfaces:
        - "Output: _site/img/icon.svg accessible at URL /img/icon.svg"
    - component: src/index.html favicon block
      responsibility: |
        Three <link> tags inserted after the existing <link rel="stylesheet"> tags:
          <link rel="icon" href="/img/icon.svg" type="image/svg+xml">
          <link rel="icon" href="/img/icon.svg" sizes="any">
          <link rel="apple-touch-icon" href="/img/icon.svg">
      interfaces:
        - "Consumed by browser tab / bookmark bar"
    - component: src/index.html navbar img
      responsibility: |
        Replace the text-only inner content of .nav-logo-icon with:
          <img src="/img/icon.svg" alt="IncidentMind icon" width="40" height="40">
        The outer .nav-logo-icon div and its gradient background + border-radius CSS are retained,
        so the SVG floats inside the styled container.
      interfaces:
        - "Visible brand element in the site navbar"
  dependencies:
    - component: favicon link tags
      relationship: depends on icon.svg existing at /img/icon.svg (passthrough must run first)
    - component: navbar img
      relationship: depends on icon.svg existing at /img/icon.svg (passthrough must run first)
  integration_points:
    - eleventy.config.js addPassthroughCopy hooks into Eleventy build pipeline
    - src/index.html is the single Liquid template rendered for the site's index page

contracts:
  - from_task: create-svg
    to_task: update-html
    interface: "File src/img/icon.svg exists with valid SVG markup"
    format: SVG text file, viewBox 0 0 64 64, self-contained gradients
  - from_task: update-passthrough
    to_task: verify-build
    interface: "eleventy.config.js contains addPassthroughCopy(\"src/img\")"
    format: JavaScript source line added to module.exports function body
  - from_task: update-html
    to_task: verify-build
    interface: "src/index.html contains favicon <link> tags and <img> in .nav-logo-icon"
    format: HTML fragments

tasks:
  - id: create-svg
    title: Create automation-themed SVG icon at src/img/icon.svg
    description: |
      Create the directory src/img/ and write src/img/icon.svg.
      SVG spec:
        - viewBox="0 0 64 64", width/height="64"
        - Background: <rect width="64" height="64" rx="14" fill="#06060f"/>
        - Inline linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"
            stop at 0%: #6366f1, stop at 100%: #8b5cf6
        - Three nodes (circles): center (32,32) r=10, top-right (50,14) r=7, bottom-left (14,50) r=7
        - Connector lines between each node pair, stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"
        - Small arc / spark marks at node 2 and node 3 (short curved paths, stroke-width=1.5)
        - All circles filled with url(#grad)
        - No text content (must render at 16px without glyphs)
    wave: 1
    agent: gem-implementer
    priority: high
    status: pending
    dependencies: []
    context_files:
      src/css/main.css: "Lines 118–145 — nav-logo-icon sizing and gradient CSS vars"
    estimated_effort: small
    estimated_files: 1
    estimated_lines: 50
    focus_area: src/img/icon.svg
    tech_stack:
      - SVG 1.1
    test_coverage: null
    verification:
      - File src/img/icon.svg exists
      - File is valid well-formed XML
      - Contains linearGradient with stops #6366f1 and #8b5cf6
      - Contains at least 3 circle elements
      - Contains at least 3 line/path connector elements
      - viewBox attribute equals "0 0 64 64"
    acceptance_criteria:
      - SVG opens in a browser without errors
      - Icon is visually legible at 64×64
      - Gradient flows indigo→violet matching site palette
    failure_modes:
      - scenario: SVG XML is malformed and browser silently shows broken image
        likelihood: low
        impact: medium
        mitigation: Validate with xmllint or open in browser before proceeding to Wave 2
    requires_review: false
    review_depth: null
    security_sensitive: false

  - id: update-passthrough
    title: Add src/img/ passthrough copy in eleventy.config.js
    description: |
      In eleventy.config.js, inside the module.exports function body, add the line:
        eleventyConfig.addPassthroughCopy("src/img");
      Place it directly after the existing eleventyConfig.addPassthroughCopy("src/js"); line.
      No other changes to this file.
    wave: 1
    agent: gem-implementer
    priority: high
    status: pending
    dependencies: []
    context_files:
      eleventy.config.js: "Full file — 17 lines, addPassthroughCopy calls on lines 8–9"
    estimated_effort: small
    estimated_files: 1
    estimated_lines: 1
    focus_area: eleventy.config.js
    tech_stack:
      - Eleventy 11ty
      - Node.js
    test_coverage: null
    verification:
      - eleventy.config.js contains the string addPassthroughCopy("src/img")
    acceptance_criteria:
      - Running `npx @11ty/eleventy` after this change emits _site/img/icon.svg
    failure_modes:
      - scenario: Typo in path string causes passthrough to silently copy nothing
        likelihood: low
        impact: high
        mitigation: Wave 3 verification checks _site/img/icon.svg existence; build fails loudly if path is wrong
    requires_review: false
    review_depth: null
    security_sensitive: false

  - id: update-html
    title: Add favicon link tags and navbar SVG img to src/index.html
    description: |
      Two edits to src/index.html:

      EDIT 1 — Favicon tags. After the final existing <link> tag in <head>
      (currently `<link rel="stylesheet" href="/css/main.css">`), insert:
        <link rel="icon" href="/img/icon.svg" type="image/svg+xml">
        <link rel="icon" href="/img/icon.svg" sizes="any">
        <link rel="apple-touch-icon" href="/img/icon.svg">

      EDIT 2 — Navbar icon. The current .nav-logo-icon div contains the
      Liquid expression {{ nav.logo.initials }} which renders the text "IN".
      Replace the entire inner content of that div with an img tag:
        <div class="nav-logo-icon">
          <img src="/img/icon.svg" alt="" width="32" height="32" aria-hidden="true">
        </div>
      (width/height 32 so the SVG graphic sits inside the 40×40 gradient container
       with 4 px breathing room on each side; aria-hidden because the parent anchor
       already carries aria-label="{{ nav.logo.ariaLabel }}")
    wave: 2
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
      - create-svg
      - update-passthrough
    context_files:
      src/index.html: "Lines 1–40 — full <head> and navbar markup"
    estimated_effort: small
    estimated_files: 1
    estimated_lines: 8
    focus_area: src/index.html
    tech_stack:
      - HTML5
      - Liquid templating (Eleventy)
    test_coverage: null
    verification:
      - src/index.html <head> contains `<link rel="icon" href="/img/icon.svg" type="image/svg+xml">`
      - src/index.html <head> contains `<link rel="apple-touch-icon" href="/img/icon.svg">`
      - .nav-logo-icon div contains `<img src="/img/icon.svg"`
      - No {{ nav.logo.initials }} expression remains inside .nav-logo-icon
    acceptance_criteria:
      - Eleventy builds without template errors after this change
      - _site/index.html contains the favicon link tags
      - Browser tab shows SVG favicon after build
    failure_modes:
      - scenario: Liquid template parse error if the img tag is malformed inside the div
        likelihood: low
        impact: medium
        mitigation: Keep img tag as plain HTML with no Liquid expressions; Liquid passes it through unchanged
    requires_review: false
    review_depth: null
    security_sensitive: false

  - id: verify-build
    title: Run Eleventy build and verify all outputs in _site/
    description: |
      Run `npx @11ty/eleventy` (or `npm run build` if a build script exists in package.json) from
      the workspace root /Users/admin/dev/website.
      Assert all of the following outputs exist and are non-empty:
        1. _site/img/icon.svg          — passthrough copy succeeded
        2. _site/index.html            — template rendered without errors
        3. _site/index.html contains `<link rel="icon" href="/img/icon.svg"`
        4. _site/index.html contains `<img src="/img/icon.svg"`
      If any assertion fails, report the specific failing item and the Eleventy stderr output.
    wave: 3
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
      - update-html
      - update-passthrough
    context_files:
      package.json: "Check for build script name"
      eleventy.config.js: "Confirm passthrough is present before running build"
    estimated_effort: small
    estimated_files: 0
    estimated_lines: 0
    focus_area: _site/
    tech_stack:
      - Eleventy 11ty
      - Node.js
    test_coverage: null
    verification:
      - Exit code of Eleventy build command is 0
      - _site/img/icon.svg file exists and size > 0
      - _site/index.html contains favicon link tag for /img/icon.svg
      - _site/index.html contains img tag for /img/icon.svg in navbar
    acceptance_criteria:
      - All four file/content assertions pass
      - No Eleventy warning or error lines in build output
    failure_modes:
      - scenario: Build fails because src/img/ directory was not created before the passthrough runs
        likelihood: low
        impact: medium
        mitigation: create-svg task creates the directory as part of writing the file; passthrough of
          a non-existent source directory is a no-op in Eleventy (not an error), so verify by checking
          _site/img/icon.svg existence explicitly
    requires_review: false
    review_depth: null
    security_sensitive: false
