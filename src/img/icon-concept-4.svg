<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="title desc">
  <title id="title">IncidentMind logo concept 4</title>
  <desc id="desc">A decision aperture mark: a framed opening with converging signal lines entering a central decision point.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="100%" stop-color="#0d1224"/>
    </linearGradient>
    <linearGradient id="frame" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="signal" x1="16" y1="32" x2="42" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <path d="M18 10h16c1.7 0 3 1.3 3 3v4c0 1.7-1.3 3-3 3H24v24h10c1.7 0 3 1.3 3 3v4c0 1.7-1.3 3-3 3H18c-4.4 0-8-3.6-8-8V18c0-4.4 3.6-8 8-8Z" fill="none" stroke="url(#frame)" stroke-width="3" stroke-linejoin="round"/>
  <path d="M46 10h0c4.4 0 8 3.6 8 8v28c0 4.4-3.6 8-8 8h0" fill="none" stroke="url(#frame)" stroke-width="3" stroke-linecap="round" opacity="0.35"/>

  <g fill="none" stroke-linecap="round">
    <line x1="17" y1="22" x2="31" y2="28" stroke="url(#signal)" stroke-width="2.4"/>
    <line x1="15" y1="32" x2="31" y2="32" stroke="url(#signal)" stroke-width="2.8"/>
    <line x1="17" y1="42" x2="31" y2="36" stroke="url(#signal)" stroke-width="2.4"/>
    <line x1="33" y1="32" x2="45" y2="32" stroke="#8b5cf6" stroke-width="2.4"/>
  </g>

  <circle cx="33" cy="32" r="8.5" fill="#0b1020" stroke="#67e8f9" stroke-opacity="0.45" stroke-width="1.4"/>
  <circle cx="33" cy="32" r="6.2" fill="url(#core)"/>
  <circle cx="45" cy="32" r="3.6" fill="#120d23" stroke="#8b5cf6" stroke-width="1.6"/>
