problem:
  label: "The Problem"
  title:
    line1: "$250B spent on"
    line2: "manual IT ops"
    line3: "every year"
  subtitle: "SaaS incident tools promise AI but deliver dashboards. Your team is still drowning in alerts, copy-pasting runbooks, and fighting the same fires. The gap isn't tools — it's implementation."
  stats:
    - value: "$250B"
      text: "Annual spend on manual IT operations globally"
    - value: "73%"
      text: "Of teams say AI tooling doesn't match their stack"
  cards:
    - icon: "fa-solid fa-puzzle-piece"
      bgColor: "rgba(239,68,68,0.1)"
      iconColor: "#ef4444"
      title: "SaaS Tools Don't Fit Your Stack"
      body: "You bought PagerDuty or Rootly but can't wire it into your actual Kubernetes clusters, DataDog alerts, CI/CD pipelines, and Confluence runbooks. The \"AI\" is a black box that doesn't learn from your incidents."
    - icon: "fa-solid fa-lock"
      bgColor: "rgba(245,158,11,0.1)"
      iconColor: "#f59e0b"
      title: "Regulated Industries Can't Use SaaS AI"
      body: "Finance, healthcare, and government need to own their AI models and data. SaaS incident platforms send your production data to their cloud — a compliance non-starter."
    - icon: "fa-solid fa-users-slash"
      bgColor: "rgba(99,102,241,0.1)"
      iconColor: "var(--accent-blue)"
      title: "No One Has Actually Built This"
      body: "Every DevOps consultant sells \"AI strategy.\" Almost none have built a production self-improving LLM incident platform with feedback loops, context aggregation, and enterprise governance."
    - icon: "fa-solid fa-microchip"
      bgColor: "rgba(16,185,129,0.1)"
      iconColor: "var(--accent-emerald)"
      title: "MCP Is the Future — But Who Builds It?"
      body: "The Model Context Protocol lets AI agents safely access internal tools. It's the next paradigm for developer productivity — but your team needs an expert who's already shipping MCP servers in production."

services:
  label: "Services"
  title:
    line1: "What"
    line2: "IncidentNow"
    line3: "delivers"
  subtitle: "Production-grade solutions from someone who's scaled platforms to $700M revenue and shipped real AI in regulated environments."
  tiers:
    - badge: "Flagship Service"
      badgeIcon: "fa-solid fa-star"
      badgeVariant: "badge-flagship"
      title: "AI-Powered Incident Intelligence"
      body: "A custom AI incident resolution platform tailored to your stack — not a generic SaaS subscription. You own the system, the models, and the data. Built on the exact architecture proven at Fidelity Charitable."
      features:
        - "Incident detection & classification pipeline with auto-triage"
        - "Multi-source context aggregation: DataDog, Confluence, CI/CD logs, K8s manifests, past incidents"
        - "LLM-powered root-cause analysis with resolution recommendations"
        - "Self-improving feedback loop — the system gets smarter with every incident"
        - "Integration with existing alerting (PagerDuty, Rootly, Slack, OpsGenie)"
        - "Enterprise governance: runs in your VPC, your data stays yours"
      pricing:
        value: "$25K–$75K"
        label: "per engagement · 6–12 weeks"
      visual:
        icon: "fa-solid fa-bolt"
        iconBg: "rgba(99,102,241,0.12)"
        iconColor: "var(--accent-blue)"
        label: "Technology stack"
        tags:
          - "LLM / GPT-4"
          - "RAG"
          - "DataDog API"
          - "Confluence"
          - "Kubernetes"
          - "Python"
          - "TypeScript"
          - "Prompt Eng."
          - "Feedback Loops"
          - "n8n"
    - badge: "High Growth"
      badgeIcon: "fa-solid fa-rocket"
      badgeVariant: "badge-growth"
      title: "MCP Servers & Enterprise AI Agents"
      body: "Build secure internal AI agents that safely access your company systems via the Model Context Protocol. Stop manually switching between tools — let AI agents do it safely, in your sandboxed environment."
      features:
        - "Custom MCP servers for DataDog, Confluence, GitHub, Jira, K8s, databases"
        - "Secure sandboxed agent environments with fine-grained permissions"
        - "RAG pipelines over internal documentation & codebases"
        - "n8n workflow automation with AI integration"
        - "Multi-agent orchestration for complex operations tasks"
        - "Built on my open-source MCP framework (mcp-generator, jobspy-mcp-server)"
      pricing:
        value: "$9K–$50K+"
        label: "per agent/server · multi-agent architectures available"
      visual:
        icon: "fa-solid fa-robot"
        iconBg: "rgba(139,92,246,0.12)"
        iconColor: "var(--accent-violet)"
        label: "Agent ecosystem"
