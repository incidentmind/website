# ─── Competitive Positioning Section ─────────────────────────────────────────
# Rendered in an anonymous <section> (no id, not linked from navbar).
# Layout: two-column .position-grid
#   Left: 2×2 quadrant visual (.position-quadrant glass)
#   Right: explanatory text (.position-text)
#
# quadrant.axes   → four axis labels positioned with CSS:
#                   top (Custom/Owned), bottom (SaaS), left (High-Touch), right (Self-Serve)
# quadrant.cells[] → four cells rendered in reading order (top-left → top-right → bottom-left → bottom-right):
#   [0] top-left     = IncidentMind  (highlight: true adds .quadrant-highlight)
#   [1] top-right    = DIY open-source
#   [2] bottom-left  = Big 4 Consulting
#   [3] bottom-right = PagerDuty / SaaS tools
#   .label   → optional bold name inside the cell (only present on the IncidentMind cell)
#   .sublabel → secondary text; muted color unless .highlight is set
#   .highlight → (bool) adds .quadrant-highlight CSS class for the IncidentMind cell
#
# text → right-column content
#   .heading → <h3>
#   .body    → <p>
#   .list[]  → icon + text <li> items in .position-list
positioning:
  label: "Why IncidentMind"
  title:
    line1: "Custom AI automation,"
    line2: "not another SaaS bot"
  quadrant:
    axes:
      top: "Owned Automation"
      bottom: "Generic SaaS"
      left: "Hands-On Delivery"
      right: "Self-Serve Tooling"
    cells:
      - label: "IncidentMind"
        sublabel: "Custom agents + automation systems"
        highlight: true      # adds .quadrant-highlight → highlighted cell with border
      - sublabel: "DIY frameworks"
      - sublabel: "Traditional consulting"
      - sublabel: "SaaS copilots & bots"
  text:
    heading: "Built for companies that need automation to fit reality"
    body: "IncidentMind sits between generic SaaS bots and abstract strategy consulting. We build company-specific automation systems that connect to your tools, respect your constraints, and leave you with software you actually own."
    list:
      - icon: "fa-solid fa-shield-halved"
        text: "Teams that need security, governance, and data control"
      - icon: "fa-solid fa-fingerprint"
        text: "Companies with unique workflows that don't fit SaaS templates"
      - icon: "fa-solid fa-brain"
