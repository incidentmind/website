# =============================================================================
# IncidentMind — Eleventy Page Data
# File: src/index.11tydata.yaml
# Template: src/index.html  (Liquid templating via Eleventy)
# Output:   _site/index.html
#
# This file drives 100% of the text, icons, colors, and links on the homepage.
# The HTML template uses Liquid syntax: {{ key }} for output, {% for %} for
# loops, {% if %} for conditionals.
#
# CSS custom properties used for colors (defined in src/css/main.css):
#   --accent-emerald   green  (#10b981)
#   --accent-blue      indigo (#6366f1)
#   --accent-violet    purple (#8b5cf6)
#   --accent-cyan      cyan   (#06b6d4)
#
# Font Awesome 6 icon classes are used throughout (fa-solid, fa-brands, …).
# =============================================================================

# ─── SEO ─────────────────────────────────────────────────────────────────────
# meta.title       → rendered in <title> and used by search engines / social cards
# meta.description → rendered in <meta name="description"> for SEO snippets
meta:
  title: "IncidentMind — HVAC & Home Service Lead Response Automation"
  description: "We help HVAC and home service companies respond to every lead in under 60 seconds, follow up automatically, and book more jobs without adding office staff."

# ─── Navbar ──────────────────────────────────────────────────────────────────
# Rendered inside <nav class="navbar">.
# nav.logo       → left-side logo mark; initials in a colored box + text label
#   .initials    → two-letter monogram rendered inside .nav-logo-icon div
#   .text        → brand name rendered in .nav-logo-text span
#   .href        → logo link target (# = top of page)
#   .ariaLabel   → aria-label on the <a> for screen readers
# nav.links[]    → rendered as <li><a> items in .nav-links <ul>
#   .label       → visible link text
#   .href        → anchor target (all are in-page anchors matching section ids)
#   .cta (bool)  → if true, adds class="nav-cta" for the highlighted CTA button style
nav:
  logo:
    initials: "IN"
    text: "IncidentMind"
    href: "#"
    ariaLabel: "IncidentMind home"
  links:
    - label: "Solutions"
      href: "#services"
    - label: "Proof"
      href: "#proof"
    - label: "Blog"
      href: "/blog/"
    - label: "Book Free Lead Audit"
      href: "#contact"
      cta: true          # adds class="nav-cta" → highlighted pill button in navbar

# ─── Hero Section ────────────────────────────────────────────────────────────
# Rendered in <section class="hero">.  No section id — it is the first visible
# element so the navbar logo links back to it via href="#".
#
# Layout: two-column hero-grid
#   Left column: text + CTAs + proof items
#   Right column: .hero-dash — glass metric card + two floating cards
hero:
  # Small "available" indicator shown above the H1 with a pulsing green dot
  tagline: "Lead response automation for HVAC and home service teams"

  # H1 split across two lines:
  #   line1 → plain text
  #   line2 → wrapped in <span class="gradient-text"> (blue→violet gradient)
  heading:
    line1: "Stop losing leads."
    line2: "Reply fast and book more jobs."

  # Paragraph below the H1 — rendered as <p class="hero-description">
  description: |
    If a customer calls after hours, fills out a form, or hits voicemail while your team is busy, IncidentMind replies fast, qualifies the lead, and keeps the conversation moving toward a booked job.

  # CTA buttons rendered as <a class="btn-{variant}">
  # variant: "primary" → solid indigo button; "secondary" → ghost/outline button
  # target: "_blank" causes rel="noopener" to be added automatically in the template
  actions:
    - label: "Book Free Lead Audit"
      href: "https://calendly.com/incidentmind"
      icon: "fa-solid fa-calendar-check"   # Font Awesome icon class inside the button
      variant: "primary"
      target: "_blank"
    - label: "See What Gets Automated"
      href: "#services"
      icon: "fa-solid fa-bolt"
      variant: "secondary"

  # Three small trust-signal items with checkmark icons shown below CTA buttons
  # Rendered as .hero-proof-item divs (fa-check-circle icon prepended in HTML)
  proofItems:
    - "Done-for-you setup"
    - "Works with your current tools"
    - "Built for paid leads and after-hours inquiries"

  # Animated stat counters inside the right-column glass card (.hero-metric-grid)
  # JS in main.js reads data-target, data-prefix, data-suffix and animates from 0
  # value  → numeric target for the counter animation
  # prefix → prepended to the displayed number (e.g. "$")
  # suffix → appended to the displayed number (e.g. "%", "M", "GB")
  # color  → CSS custom property applied as inline style for the metric value text
  metrics:
    - value: 60
      suffix: "s"
      label: "First reply target"
      color: "var(--accent-emerald)"
    - value: 24
      suffix: "/7"
      label: "Lead coverage"
      color: "var(--accent-blue)"
    - value: 3
      suffix: ""
      label: "Qualification steps"
      color: "var(--accent-violet)"
    - value: 1
      suffix: ""
      label: "Owner dashboard"
      color: "var(--accent-cyan)"

  # Two floating glass cards overlaid on the hero right column (.hero-float-card)
  # position → CSS class applied to the card for absolute positioning:
  #            "card-1" = upper-left float, "card-2" = lower-right float
  # bgColor  → inline background on the icon wrapper div (rgba for transparency)
  # iconColor → inline color on the icon wrapper div
  floatCards:
    - title: "Missed Call Text-Back"
      subtitle: "Reply even when voicemail gets hit"
      icon: "fa-solid fa-bolt"
      bgColor: "rgba(16,185,129,0.1)"
      iconColor: "var(--accent-emerald)"
      position: "card-1"
    - title: "Quote Follow-Up"
      subtitle: "Keep warm estimates moving"
      icon: "fa-solid fa-calendar-check"
      bgColor: "rgba(99,102,241,0.1)"
      iconColor: "var(--accent-blue)"
      position: "card-2"

# ─── Problem Section ─────────────────────────────────────────────────────────
# Rendered in <section class="problem-section">. No HTML id — not linked from nav.
# Layout: sticky left column (label + H2 + stats) and scrolling right column (cards).
#
# label    → small eyebrow text above H2 (.section-label span)
# title    → H2 split across three lines; line2 gets .gradient-text
# subtitle → paragraph below the H2
# stats[]  → two glass stat boxes in .problem-stats
#   .value → pre-formatted string (e.g. "$250B") shown large
#   .text  → supporting description below the value
# cards[]  → four .problem-card glass cards in the right scroll column
#   .icon      → Font Awesome class for the card icon
#   .bgColor   → inline background on the icon wrapper
#   .iconColor → inline color on the icon wrapper
#   .title     → <h3> inside the card
#   .body      → <p> inside the card
problem:
  label: "The Problem"
  title:
    line1: "You are already"
    line2: "getting leads"
    line3: "but losing them"
  subtitle: "Most HVAC and home service companies do not have a lead problem first. They have a response problem. Calls get missed, forms sit too long, and warm leads go cold after hours."
  stats:
    - value: "78%"
      text: "Buyers often go with whoever replies first"
    - value: "5 min"
      text: "Best window to follow up on hot leads"
  cards:
    - icon: "fa-solid fa-phone-slash"
      bgColor: "rgba(239,68,68,0.1)"
      iconColor: "#ef4444"
      title: "Missed Calls"
      body: "A paid lead hits voicemail, nobody follows up quickly, and the job goes somewhere else."
    - icon: "fa-solid fa-moon"
      bgColor: "rgba(245,158,11,0.1)"
      iconColor: "#f59e0b"
      title: "After-Hours Leads"
      body: "Website inquiries come in at night or on weekends and sit there until someone notices them."
    - icon: "fa-solid fa-list-check"
      bgColor: "rgba(99,102,241,0.1)"
      iconColor: "var(--accent-blue)"
      title: "Manual Follow-Up"
      body: "Office staff are busy, messages get buried, and quote follow-up becomes inconsistent."
    - icon: "fa-solid fa-dollar-sign"
      bgColor: "rgba(16,185,129,0.1)"
      iconColor: "var(--accent-emerald)"
      title: "Paid Lead Waste"
      body: "Google Ads, LSAs, Angi, and Yelp get expensive fast when response time slips."

# ─── Services Section ────────────────────────────────────────────────────────
# Rendered in <section id="services" class="services-section">.
# Linked from navbar as href="#services".
#
# Rendering order / layout:
#   1. Section header (label + H2 + subtitle)
#   2. First 3 tiers in alternating left-right layout
#      (even index → content-left / visual-right; odd → reversed)
#      Template: {% for tier in services.tiers limit:3 %}
#   3. platformCards grid (6 cards in a 3-column grid)
#   4. Remaining tiers rendered after the platform grid
#      Template: {% for tier in services.tiers offset:3 %}
#
# Per-tier fields:
#   badge / badgeIcon / badgeVariant → pill badge above H3
#     badgeVariant CSS classes: badge-flagship | badge-growth | badge-core | badge-advisory
#   title                → <h3> service name
#   body                 → <p> description paragraph
#   features[]           → <ul class="service-features"> checklist (fa-check prepended)
#   pricing.value        → displayed with .gradient-text class (price range string)
#   pricing.label        → plain text beside the price (timeframe / notes)
#   visual               → right-side glass card showing the tech stack for this service
#     .icon              → large icon inside the glass card
#     .iconBg / .iconColor → inline styles on the icon wrapper
#     .label             → caption below the icon (e.g. "Technology stack")
#     .tags[]            → tech pill tags rendered as <span class="tech-tag">
