      badgeVariant: "badge-core"
      title: "Platform Engineering Acceleration"
      body: "Hands-on DevOps engineering to modernize your infrastructure — not a slideshow. Migration execution, IaC adoption, CI/CD optimization, and observability, delivered by someone with 7+ years doing exactly this at Fidelity."
      features:
