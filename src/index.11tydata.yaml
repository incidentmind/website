        label: "founding-client setup + monthly from $500"
      visual:
        icon: "fa-solid fa-comments"
        iconBg: "rgba(99,102,241,0.12)"
        iconColor: "var(--accent-blue)"
        label: "First rollout"
        tags:
          - "Website Forms"
          - "Missed Calls"
          - "SMS Replies"
          - "Email Replies"
          - "Booking Handoff"
    # Tier 2 — rendered second (right-content / left-visual, alternating)
    - badge: "Fastest Win"
      badgeIcon: "fa-solid fa-phone-volume"
      badgeVariant: "badge-flagship"
      title: "Missed Call & After-Hours Recovery"
      body: "When a customer calls after hours or hits voicemail, IncidentMind follows up right away instead of waiting until morning."
      features:
        - "Missed-call text-back"
        - "After-hours lead capture"
        - "Priority routing for urgent jobs"
        - "Morning handoff queue"
        - "Owner alerts for hot leads"
      pricing:
        value: "From $500/mo"
        label: "easy add-on for ad-driven businesses"
      visual:
        icon: "fa-solid fa-moon"
        iconBg: "rgba(99,102,241,0.12)"
        iconColor: "var(--accent-blue)"
        label: "Response gaps closed"
        tags:
          - "Missed Call Text-Back"
          - "After-Hours"
          - "Voicemail Recovery"
          - "Priority Alerts"
          - "Escalation Rules"
    # Tier 3 — rendered third (left-content / right-visual, alternating)
    - badge: "Conversion Boost"
      badgeIcon: "fa-solid fa-calendar-check"
      badgeVariant: "badge-growth"
      title: "Quote Follow-Up & Booking Automation"
      body: "Keep estimates and warm leads moving with automatic follow-up, reminders, and a cleaner path from inquiry to booked job."
      features:
