# ─── Approach Section ────────────────────────────────────────────────────────
# Rendered in an anonymous <section> (no id, not linked from navbar).
# Centered header + 4-step horizontal card strip (.approach-steps).
# steps[].title → <h4> inside each .approach-step glass card
# steps[].body  → <p> inside each card
approach:
  label: "How IncidentMind Works"
  title:
    line1: "From workflow audit to"
    line2: "production"    # wrapped in .gradient-text
  subtitle: "No generic discovery theater. IncidentMind works directly with your team to identify the right workflow, design the automation, ship it, and operationalize it."
  steps:
    - title: "Discover"
      body: "Understand where manual work, delays, and context switching are costing your team time. Focus on the workflow, not the hype."
    - title: "Assess"
      body: "Map systems, permissions, approvals, and failure modes. Identify where agents, MCP, workflow orchestration, and platform changes are actually needed."
    - title: "Build"
      body: "Implement the automation in your environment with iterative demos, real integrations, and production-ready controls."
    - title: "Operationalize"
      body: "Roll out with documentation, observability, training, and ownership so the system keeps working after launch."

# ─── Proof / Results Section ─────────────────────────────────────────────────
