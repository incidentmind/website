# Linked from navbar as href="#proof".
#
# Layout: vertical timeline (.proof-timeline) — each item has a left glass card
# and right content via CSS grid (.proof-item).
#
# items[]:
#   .date            → eyebrow date range styled with .dateColor
#   .dateColor       → inline color on the .proof-date div
#   .timelineDotColor → CSS custom property for the timeline connector dot
#                       (set on the element, but current HTML does not apply it;
#                        reserved for future CSS use or JS enhancement)
#   .title           → <h3> inside the glass card
#   .body            → <p> inside the glass card
#   .metrics[]       → small stat boxes inside .proof-metrics
#     .value         → pre-formatted string (e.g. "$700M") displayed large
#     .label         → caption below value
#     .color         → inline color on the value element
#   .highlights[]    → bullet list on the right side (.proof-highlights)
