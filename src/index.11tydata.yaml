# ─── Approach Section ────────────────────────────────────────────────────────
# Rendered in an anonymous <section> (no id, not linked from navbar).
# Centered header + 4-step horizontal card strip (.approach-steps).
# steps[].title → <h4> inside each .approach-step glass card
# steps[].body  → <p> inside each card
approach:
  label: "How it works"
  title:
    line1: "From lead leak audit to"
    line2: "live workflow"    # wrapped in .gradient-text
  subtitle: "No giant implementation project. We start with one high-friction response gap, launch the workflow quickly, and improve it with real lead data."
  steps:
    - title: "Audit"
      body: "Review how calls, forms, and after-hours leads are handled today."
    - title: "Map"
      body: "Decide what gets automated, what stays human, and where the handoff happens."
    - title: "Launch"
      body: "Go live with a focused workflow tied to your real lead sources."
    - title: "Improve"
      body: "Tighten response times, follow-up, and booking flow based on what actually happens."

# ─── Proof / Results Section ─────────────────────────────────────────────────
# Rendered in <section id="proof" class="proof-section">.
# Linked from navbar as href="#proof".
#
# Layout: vertical timeline (.proof-timeline) — each item has a left glass card
# and right content via CSS grid (.proof-item).
#
# items[]:
#   .date            → eyebrow date range styled with .dateColor
#   .dateColor       → inline color on the .proof-date div
#   .timelineDotColor → CSS custom property for the timeline connector dot
#                       (set on the element, but current HTML does not apply it;
#                        reserved for future CSS use or JS enhancement)
#   .title           → <h3> inside the glass card
#   .body            → <p> inside the glass card
#   .metrics[]       → small stat boxes inside .proof-metrics
#     .value         → pre-formatted string (e.g. "$700M") displayed large
#     .label         → caption below value
#     .color         → inline color on the value element
#   .highlights[]    → bullet list on the right side (.proof-highlights)
#                       fa-check icon prepended in HTML
proof:
  label: "Proof"
  title:
    line1: "Built by someone who"
    line2: "ships real systems"
  subtitle: "I'm not going to fake local client logos. What I can show you is a track record of building systems where speed, uptime, and follow-through actually mattered."
  items:
    - date: "2007 – 2015 · EAT24"
      dateColor: "var(--accent-blue)"
      timelineDotColor: "var(--accent-blue)"
      title: "Built order and ops systems where speed mattered"
      body: "At EAT24, delayed response meant lost orders. I built the original platform from scratch and helped it grow through real operational complexity and acquisition."
      metrics:
        - value: "$700M"
          label: "Gross Revenue"
          color: "var(--accent-emerald)"
        - value: "$134M"
          label: "Yelp Acquisition"
          color: "var(--accent-blue)"
        - value: "40K+"
          label: "Restaurants"
          color: "var(--accent-violet)"
      highlights:
        - "Built the technology stack that ran the business day to day"
        - "Handled time-sensitive customer and restaurant workflows at scale"
        - "Led the platform through two acquisitions"
        - "Learned the difference between a demo and a system people depend on"
    - date: "2019 – Present · Fidelity Charitable"
      dateColor: "var(--accent-emerald)"
      timelineDotColor: "var(--accent-emerald)"
      title: "Shipped automation in environments that could not be sloppy"
      body: "At Fidelity Charitable, I built platform systems and AI-assisted incident workflows in a regulated enterprise where reliability, approvals, and clear handoffs mattered."
      metrics:
        - value: "60%"
          label: "MTTR Reduction"
          color: "var(--accent-emerald)"
        - value: "40%"
          label: "Faster CI/CD"
          color: "var(--accent-blue)"
        - value: "12GB"
          label: "Daily ETL"
          color: "var(--accent-violet)"
      highlights:
        - "Built automation with real guardrails, observability, and ownership"
        - "Integrated across docs, alerts, CI/CD, Kubernetes, and internal tools"
        - "Worked inside security and compliance constraints"
        - "Designed handoffs where humans stayed in control when needed"
    - date: "20+ years · multiple industries"
      dateColor: "var(--accent-violet)"
      timelineDotColor: "var(--accent-violet)"
      title: "Not learning on your business"
      body: "I have spent two decades building customer-facing and operational systems across food delivery, HR tech, marketplaces, and enterprise platforms. That experience is what IncidentMind brings to a smaller, faster engagement."
      metrics:
        - value: "20+"
          label: "Years"
          color: "var(--accent-cyan)"
        - value: "5+"
          label: "Industries"
          color: "var(--accent-emerald)"
      highlights:
        - "Comfortable inside messy real workflows"
        - "Builder-first, not slide-deck-first"
        - "Fast enough for small projects, disciplined enough for production"

# ─── Competitive Positioning Section ─────────────────────────────────────────
# Rendered in an anonymous <section> (no id, not linked from navbar).
# Layout: two-column .position-grid
#   Left: 2×2 quadrant visual (.position-quadrant glass)
#   Right: explanatory text (.position-text)
#
# quadrant.axes   → four axis labels positioned with CSS:
#                   top (Custom/Owned), bottom (SaaS), left (High-Touch), right (Self-Serve)
# quadrant.cells[] → four cells rendered in reading order (top-left → top-right → bottom-left → bottom-right):
#   [0] top-left     = IncidentMind  (highlight: true adds .quadrant-highlight)
#   [1] top-right    = DIY open-source
#   [2] bottom-left  = Big 4 Consulting
#   [3] bottom-right = PagerDuty / SaaS tools
#   .label   → optional bold name inside the cell (only present on the IncidentMind cell)
#   .sublabel → secondary text; muted color unless .highlight is set
#   .highlight → (bool) adds .quadrant-highlight CSS class for the IncidentMind cell
#
# text → right-column content
#   .heading → <h3>
#   .body    → <p>
#   .list[]  → icon + text <li> items in .position-list
positioning:
  label: "Who this is for"
  title:
    line1: "Best for HVAC and"
    line2: "home service teams"
  quadrant:
    axes:
      top: "Done-for-you"
      bottom: "DIY or generic"
      left: "Fits your workflow"
      right: "One-size-fits-all"
    cells:
      - label: "IncidentMind"
        sublabel: "Done-for-you lead response automation"
        highlight: true      # adds .quadrant-highlight → highlighted cell with border
      - sublabel: "DIY tools & automations"
      - sublabel: "Traditional agencies"
      - sublabel: "Generic AI chatbots"
  text:
    heading: "A good fit if you already pay for leads"
    body: "IncidentMind is a strong fit when you already have inbound demand and the leak is response speed, after-hours coverage, or inconsistent follow-up. If you want a simple system that works with your current tools, this is for you."
    list:
      - icon: "fa-solid fa-screwdriver-wrench"
        text: "HVAC and home service teams with 20+ inbound leads a month"
      - icon: "fa-solid fa-bullhorn"
        text: "Businesses spending on Google Ads, LSAs, Angi, Yelp, or website forms"
      - icon: "fa-solid fa-phone-volume"
        text: "Owners who miss after-hours calls or slow callbacks"
      - icon: "fa-solid fa-user-check"
        text: "Teams that want done-for-you setup, not another login"

