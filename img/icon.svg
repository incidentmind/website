<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="title desc">
  <title id="title">IncidentMind logo concept 3</title>
  <desc id="desc">A premium, more ownable mark that subtly suggests an IM monogram through connected control paths and a bright decision core.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060d"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <linearGradient id="primary" x1="14" y1="49" x2="50" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="52%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="secondary" x1="22" y1="18" x2="45" y2="47" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="none" stroke="rgba(255,255,255,0.07)"/>

  <!-- Subtle IM-inspired routing: a vertical intelligent spine + angled orchestration branch -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 16V48" stroke="#182033" stroke-width="5"/>
    <path d="M20 32H34" stroke="#182033" stroke-width="5"/>
    <path d="M34 32L50 16" stroke="#182033" stroke-width="5"/>
    <path d="M34 32L50 48" stroke="#182033" stroke-width="5"/>

    <path d="M20 16V48" stroke="url(#secondary)" stroke-width="2.6" opacity="0.95"/>
    <path d="M20 32H34" stroke="url(#primary)" stroke-width="2.8" opacity="0.98"/>
    <path d="M34 32L50 16" stroke="url(#primary)" stroke-width="2.8" opacity="0.98" filter="url(#halo)"/>
    <path d="M34 32L50 48" stroke="url(#secondary)" stroke-width="2.6" opacity="0.95"/>
  </g>

  <circle cx="20" cy="16" r="5.5" fill="#08131d" stroke="#10b981" stroke-width="1.8"/>
  <circle cx="20" cy="48" r="5.5" fill="#08131d" stroke="#06b6d4" stroke-width="1.8"/>
  <circle cx="50" cy="16" r="5.8" fill="#120d23" stroke="#8b5cf6" stroke-width="1.8"/>
  <circle cx="50" cy="48" r="5.8" fill="#0b1322" stroke="#6366f1" stroke-width="1.8"/>

  <circle cx="34" cy="32" r="10.5" fill="#0b1020" opacity="0.55" filter="url(#halo)"/>
  <circle cx="34" cy="32" r="8.5" fill="url(#core)"/>
  <circle cx="34" cy="32" r="12" fill="none" stroke="#67e8f9" stroke-opacity="0.35" stroke-width="1.4"/>
  <circle cx="34" cy="32" r="2.5" fill="#ffffff"/>
</svg>
